<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultPass — Iniciar Sesión</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card animate-in">
    <div class="login-logo">
      <div class="login-logo-icon">🔐</div>
      <h1>Vault<span>Pass</span></h1>
      <p>Gestor de contraseñas seguro</p>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          class="form-control"
          placeholder="admin@vaultpass.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-group">
          <input
            id="password"
            type="password"
            class="form-control"
            placeholder="••••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="input-group-btn" id="toggle-pw" title="Mostrar/ocultar">👁</button>
        </div>
      </div>

      <div id="login-error" style="display:none;color:var(--danger);font-size:13px;margin-bottom:12px;padding:10px 12px;background:rgba(255,77,106,0.08);border-radius:8px;border:1px solid rgba(255,77,106,0.2);"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;height:44px;" id="login-btn">
        Iniciar sesión
      </button>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:12px;color:var(--text-3);">
      VaultPass v1.0 — Tus contraseñas, cifradas y seguras.
    </p>
  </div>
</div>

<script type="module">
  import { apiLogin, APP_ROUTES } from '../js/api.js';

  // Redirect if already logged in
  if (localStorage.getItem('vp_token')) {
    const exp = localStorage.getItem('vp_expires');
    if (!exp || Date.now() < Number(exp)) {
      window.location.href = APP_ROUTES.dashboard;
    }
  }

  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  const togglePw = document.getElementById('toggle-pw');
  const pwInput = document.getElementById('password');

  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    togglePw.textContent = show ? '🙈' : '👁';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verificando...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      await apiLogin(email, password);
      window.location.href = APP_ROUTES.dashboard;
    } catch (err) {
      errorBox.textContent = err.message || 'Error al iniciar sesión';
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  });
</script>
</body>
</html>
